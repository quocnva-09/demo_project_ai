server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /demo-auth

spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: "com.mysql.cj.jdbc.Driver"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION} #milliseconds
  refreshable-duration: ${JWT_REFRESHABLE_DURATION} #milliseconds

url:
  fe_url_local: ${FE_URL_LOCAL}